<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Dog App — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fafafa;
    color: #1a1a1a;
    padding: 24px;
  }
  .container {
    text-align: center;
    max-width: 320px;
  }
  .icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    background: #fef3c7;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  p {
    font-size: 14px;
    color: #6b7280;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  .buttons { display: flex; flex-direction: column; gap: 10px; }
  button {
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button:active { opacity: 0.8; }
  .btn-secondary {
    background: transparent;
    color: #374151;
    border: 1px solid #d1d5db;
  }
</style>
</head>
<body>
<div class="container">
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>Connect to the internet and try again. Any dogs you caught offline will sync automatically.</p>
  <div class="buttons">
    <button onclick="location.reload()">Try Again</button>
    <button class="btn-secondary" onclick="history.back()">Go Back</button>
  </div>
</div>
</body>
</html>
